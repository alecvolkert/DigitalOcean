<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Environmental Monitor</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns"></script>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg:         #1a1c2c;
            --bg-card:    #16213e;
            --bg-dark:    #0f0f23;
            --pink:       #ff004d;
            --yellow:     #ffec27;
            --green:      #00e436;
            --cyan:       #29adff;
            --orange:     #ff6c24;
            --purple:     #7e2553;
            --white:      #fff1e8;
            --grey:       #5f574f;
            --border-px:  4px;
            --font:       'Press Start 2P', monospace;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html { image-rendering: pixelated; }

        body {
            background-color: var(--bg);
            color: var(--white);
            font-family: var(--font);
            font-size: 8px;
            line-height: 1.8;
            min-height: 100vh;
            /* pixel checkerboard background */
            background-image:
                radial-gradient(ellipse at 30% 20%, rgba(126,37,83,0.3) 0%, transparent 50%),
                radial-gradient(ellipse at 70% 80%, rgba(41,173,255,0.15) 0%, transparent 50%);
        }

        /* pixel border mixin — chunky 4px solid borders with drop shadow */
        .px-border {
            border: var(--border-px) solid var(--white);
            box-shadow:
                4px 4px 0 var(--bg-dark),
                inset -2px -2px 0 rgba(0,0,0,0.4),
                inset 2px 2px 0 rgba(255,255,255,0.1);
        }

        .wrapper {
            max-width: 1300px;
            margin: 0 auto;
            padding: 24px 16px 48px;
        }

        /* ---- Header ---- */
        header {
            margin-bottom: 32px;
            padding: 20px;
            background: var(--purple);
            border: var(--border-px) solid var(--white);
            box-shadow: 6px 6px 0 var(--bg-dark);
            position: relative;
            overflow: hidden;
        }

        header::before {
            content: '';
            position: absolute;
            inset: 0;
            background: repeating-linear-gradient(
                90deg,
                transparent,
                transparent 8px,
                rgba(255,255,255,0.03) 8px,
                rgba(255,255,255,0.03) 16px
            );
            pointer-events: none;
        }

        .site-title {
            font-size: clamp(10px, 2.5vw, 18px);
            color: var(--yellow);
            text-shadow:
                2px 2px 0 var(--pink),
                4px 4px 0 rgba(0,0,0,0.5);
            letter-spacing: 0.1em;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        /* pixel sprite star */
        .sprite {
            display: inline-block;
            width: 16px;
            height: 16px;
            background:
                linear-gradient(var(--yellow), var(--yellow)) 6px 0/4px 16px,
                linear-gradient(var(--yellow), var(--yellow)) 0 6px/16px 4px;
            animation: spin 4s steps(4) infinite;
            flex-shrink: 0;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .site-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            color: var(--cyan);
            font-size: 7px;
        }

        .site-meta span {
            background: var(--bg-dark);
            padding: 4px 8px;
            border: 2px solid var(--cyan);
        }

        /* ---- Summary cards ---- */
        .summary {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 12px;
            margin-bottom: 28px;
        }

        .summary-card {
            background: var(--bg-card);
            border: var(--border-px) solid var(--white);
            box-shadow: 4px 4px 0 var(--bg-dark);
            padding: 12px 10px;
            position: relative;
            transition: transform 0.1s;
        }

        .summary-card:hover {
            transform: translate(-2px, -2px);
            box-shadow: 6px 6px 0 var(--bg-dark);
        }

        /* coloured top stripe per card */
        .summary-card:nth-child(1) { border-top: var(--border-px) solid var(--pink); }
        .summary-card:nth-child(2) { border-top: var(--border-px) solid var(--cyan); }
        .summary-card:nth-child(3) { border-top: var(--border-px) solid var(--yellow); }
        .summary-card:nth-child(4) { border-top: var(--border-px) solid var(--green); }
        .summary-card:nth-child(5) { border-top: var(--border-px) solid var(--orange); }
        .summary-card:nth-child(6) { border-top: var(--border-px) solid var(--pink); }
        .summary-card:nth-child(7) { border-top: var(--border-px) solid var(--purple); }

        .summary-card .label {
            font-size: 7px;
            color: var(--grey);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .summary-card .value {
            font-size: clamp(10px, 2vw, 14px);
            color: var(--yellow);
            text-shadow: 2px 2px 0 rgba(0,0,0,0.5);
        }

        /* ---- Charts grid ---- */
        .charts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(min(100%, 440px), 1fr));
            gap: 16px;
        }

        .chart-card {
            background: var(--bg-card);
            border: var(--border-px) solid var(--white);
            box-shadow: 4px 4px 0 var(--bg-dark);
            padding: 16px;
            transition: transform 0.1s;
        }

        .chart-card:hover {
            transform: translate(-2px, -2px);
            box-shadow: 6px 6px 0 var(--bg-dark);
        }

        .chart-card.full-width {
            grid-column: 1 / -1;
        }

        .chart-card h2 {
            font-size: 8px;
            color: var(--cyan);
            text-shadow: 1px 1px 0 var(--bg-dark);
            margin-bottom: 14px;
            padding-bottom: 10px;
            border-bottom: 2px solid var(--grey);
            letter-spacing: 0.08em;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* pixel icon before each chart title */
        .chart-card h2::before {
            content: '▶';
            color: var(--yellow);
            font-size: 8px;
        }

        /* ---- Footer ---- */
        .last-updated {
            text-align: center;
            color: var(--grey);
            font-size: 7px;
            margin-top: 24px;
            padding-top: 14px;
            border-top: 2px solid var(--grey);
            letter-spacing: 0.08em;
        }

        /* ---- Scrollbar ---- */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-dark); }
        ::-webkit-scrollbar-thumb {
            background: var(--purple);
            border: 2px solid var(--white);
        }

        /* ---- Mobile ---- */
        @media (max-width: 600px) {
            .summary { grid-template-columns: repeat(2, 1fr); }
            .site-title { font-size: 9px; }
            .chart-card { padding: 12px; }
        }
    </style>
</head>
<body>
<div class="wrapper">

    <header>
        <div class="site-title">
            <span class="sprite"></span>
            ENV MONITOR
        </div>
        <div class="site-meta">
            <span>ARVADA CO</span>
            <span>1650M</span>
            <span id="last-updated">SYNCING...</span>
        </div>
    </header>

    <div class="summary">
        <div class="summary-card">
            <div class="label">Temp °C</div>
            <div class="value" id="latest-temp">--</div>
        </div>
        <div class="summary-card">
            <div class="label">Humidity %</div>
            <div class="value" id="latest-hum">--</div>
        </div>
        <div class="summary-card">
            <div class="label">Pressure</div>
            <div class="value" id="latest-press">--</div>
        </div>
        <div class="summary-card">
            <div class="label">PM2.5</div>
            <div class="value" id="latest-pm25">--</div>
        </div>
        <div class="summary-card">
            <div class="label">Oxidising</div>
            <div class="value" id="latest-oxidising">--</div>
        </div>
        <div class="summary-card">
            <div class="label">Reducing</div>
            <div class="value" id="latest-reducing">--</div>
        </div>
        <div class="summary-card">
            <div class="label">NH3</div>
            <div class="value" id="latest-nh3">--</div>
        </div>
    </div>

    <div class="charts-grid">
        <div class="chart-card">
            <h2>Temperature (°C)</h2>
            <canvas id="temp-chart"></canvas>
        </div>
        <div class="chart-card">
            <h2>Humidity (%)</h2>
            <canvas id="hum-chart"></canvas>
        </div>
        <div class="chart-card">
            <h2>Pressure (hPa)</h2>
            <canvas id="press-chart"></canvas>
        </div>
        <div class="chart-card">
            <h2>Altitude (m)</h2>
            <canvas id="alt-chart"></canvas>
        </div>
        <div class="chart-card full-width">
            <h2>Particulate Matter (µg/m³)</h2>
            <canvas id="pm-chart"></canvas>
        </div>
        <div class="chart-card full-width">
            <h2>Gas Sensors (Ω)</h2>
            <canvas id="gas-chart"></canvas>
        </div>
    </div>

    <p class="last-updated" id="footer-updated">LAST SYNC: --</p>

</div>

<script>
    Chart.defaults.color = '#5f574f'
    Chart.defaults.borderColor = '#3a3a5a'

    function getOptions(showLegend = false) {
        return {
            responsive: true,
            scales: {
                x: {
                    type: 'time',
                    time: { unit: 'minute' },
                    grid: { color: 'rgba(255,255,255,0.05)' },
                    ticks: { color: '#5f574f', font: { family: "'Press Start 2P'", size: 6 } }
                },
                y: {
                    grid: { color: 'rgba(255,255,255,0.05)' },
                    ticks: { color: '#5f574f', font: { family: "'Press Start 2P'", size: 6 } }
                }
            },
            plugins: {
                legend: {
                    display: showLegend,
                    labels: { color: '#fff1e8', font: { family: "'Press Start 2P'", size: 7 }, boxWidth: 12 }
                }
            }
        }
    }

    function createChart(canvasId, label, color) {
        return new Chart(document.getElementById(canvasId), {
            type: 'line',
            data: {
                labels: [],
                datasets: [{
                    label: label,
                    data: [],
                    borderColor: color,
                    backgroundColor: color + '22',
                    tension: 0,
                    pointRadius: 2,
                    pointStyle: 'rect',
                    borderWidth: 2,
                    fill: true
                }]
            },
            options: getOptions(false)
        })
    }

    function createMultiChart(canvasId, datasets) {
        return new Chart(document.getElementById(canvasId), {
            type: 'line',
            data: {
                labels: [],
                datasets: datasets.map(d => ({
                    label: d.label,
                    data: [],
                    borderColor: d.color,
                    backgroundColor: d.color + '18',
                    tension: 0,
                    pointRadius: 2,
                    pointStyle: 'rect',
                    borderWidth: 2,
                    fill: false
                }))
            },
            options: getOptions(true)
        })
    }

    const tempChart  = createChart('temp-chart',  'Temperature °C', '#ff004d')
    const humChart   = createChart('hum-chart',   'Humidity %',     '#29adff')
    const pressChart = createChart('press-chart', 'Pressure hPa',   '#ffec27')
    const altChart   = createChart('alt-chart',   'Altitude m',     '#00e436')

    const pmChart = createMultiChart('pm-chart', [
        { label: 'PM1.0', color: '#29adff' },
        { label: 'PM2.5', color: '#ffec27' },
        { label: 'PM10',  color: '#ff004d' }
    ])

    const gasChart = createMultiChart('gas-chart', [
        { label: 'Oxidising', color: '#ff004d' },
        { label: 'Reducing',  color: '#29adff' },
        { label: 'NH3',       color: '#00e436' }
    ])

    function updateChart(chart, labels, values) {
        chart.data.labels = labels
        chart.data.datasets[0].data = values
        chart.update()
    }

    function updateAll() {
        fetch('/api/readings')
            .then(r => r.json())
            .then(data => {
                if (data.length === 0) return

                const timestamps = data.map(r => r.timestamp)
                const latest = data[0]

                document.getElementById('latest-temp').textContent      = latest.temperature?.toFixed(1) ?? '--'
                document.getElementById('latest-hum').textContent       = latest.humidity?.toFixed(1) ?? '--'
                document.getElementById('latest-press').textContent     = ((latest.pressure ?? 0) / 100).toFixed(1)
                document.getElementById('latest-pm25').textContent      = latest.PM25?.toFixed(1) ?? '--'
                document.getElementById('latest-oxidising').textContent = latest.oxidising?.toFixed(0) ?? '--'
                document.getElementById('latest-reducing').textContent  = latest.reducing?.toFixed(0) ?? '--'
                document.getElementById('latest-nh3').textContent       = latest.nh3?.toFixed(0) ?? '--'

                updateChart(tempChart,  timestamps, data.map(r => r.temperature))
                updateChart(humChart,   timestamps, data.map(r => r.humidity))
                updateChart(pressChart, timestamps, data.map(r => (r.pressure / 100).toFixed(2)))
                updateChart(altChart,   timestamps, data.map(r => r.altitude))

                pmChart.data.labels = timestamps
                pmChart.data.datasets[0].data = data.map(r => r.PM1)
                pmChart.data.datasets[1].data = data.map(r => r.PM25)
                pmChart.data.datasets[2].data = data.map(r => r.PM10)
                pmChart.update()

                gasChart.data.labels = timestamps
                gasChart.data.datasets[0].data = data.map(r => r.oxidising)
                gasChart.data.datasets[1].data = data.map(r => r.reducing)
                gasChart.data.datasets[2].data = data.map(r => r.nh3)
                gasChart.update()

                const time = new Date().toLocaleTimeString()
                document.getElementById('last-updated').textContent = time
                document.getElementById('footer-updated').textContent = 'LAST SYNC: ' + time
            })
    }

    updateAll()
    setInterval(updateAll, 30000)
</script>
</body>
</html>
