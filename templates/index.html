<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Environmental Monitor</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns"></script>
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #f8f9fa;
            color: #1a1a1a;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            font-size: 14px;
            line-height: 1.5;
        }

        .wrapper {
            max-width: 1300px;
            margin: 0 auto;
            padding: 32px 20px 60px;
        }

        header {
            margin-bottom: 32px;
            padding-bottom: 20px;
            border-bottom: 1px solid #e5e7eb;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            flex-wrap: wrap;
            gap: 12px;
        }

        .site-title {
            font-size: 22px;
            font-weight: 600;
            color: #111;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #22c55e;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        .site-meta {
            font-size: 12px;
            color: #6b7280;
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
        }

        .summary {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
            gap: 12px;
            margin-bottom: 28px;
        }

        .summary-card {
            background: #fff;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            padding: 14px 12px;
        }

        .summary-card .label {
            font-size: 11px;
            color: #9ca3af;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            margin-bottom: 6px;
        }

        .summary-card .value {
            font-size: 20px;
            font-weight: 600;
            color: #111;
        }

        .charts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(min(100%, 440px), 1fr));
            gap: 16px;
        }

        .chart-card {
            background: #fff;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            padding: 20px;
        }

        .chart-card.full-width {
            grid-column: 1 / -1;
        }

        .chart-card h2 {
            font-size: 12px;
            font-weight: 500;
            color: #6b7280;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid #f3f4f6;
        }

        .last-updated {
            text-align: center;
            color: #9ca3af;
            font-size: 11px;
            margin-top: 24px;
            padding-top: 16px;
            border-top: 1px solid #e5e7eb;
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #f3f4f6; }
        ::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 3px; }

        @media (max-width: 600px) {
            .summary { grid-template-columns: repeat(2, 1fr); }
            header { flex-direction: column; align-items: flex-start; }
        }
    </style>
</head>
<body>
<div class="wrapper">

    <header>
        <div class="site-title">
            <span class="status-dot"></span>
            Environmental Monitor
        </div>
        <div class="site-meta">
            <span>Arvada, Colorado</span>
            <span>1,650m elevation</span>
            <span id="last-updated">Syncing...</span>
        </div>
    </header>

    <div class="summary">
        <div class="summary-card">
            <div class="label">Temperature</div>
            <div class="value" id="latest-temp">--</div>
        </div>
        <div class="summary-card">
            <div class="label">Humidity</div>
            <div class="value" id="latest-hum">--</div>
        </div>
        <div class="summary-card">
            <div class="label">Pressure hPa</div>
            <div class="value" id="latest-press">--</div>
        </div>
        <div class="summary-card">
            <div class="label">PM2.5 µg/m³</div>
            <div class="value" id="latest-pm25">--</div>
        </div>
        <div class="summary-card">
            <div class="label">Oxidising Ω</div>
            <div class="value" id="latest-oxidising">--</div>
        </div>
        <div class="summary-card">
            <div class="label">Reducing Ω</div>
            <div class="value" id="latest-reducing">--</div>
        </div>
        <div class="summary-card">
            <div class="label">NH3 Ω</div>
            <div class="value" id="latest-nh3">--</div>
        </div>
    </div>

    <div class="charts-grid">
        <div class="chart-card">
            <h2>Temperature (°C)</h2>
            <canvas id="temp-chart"></canvas>
        </div>
        <div class="chart-card">
            <h2>Humidity (%)</h2>
            <canvas id="hum-chart"></canvas>
        </div>
        <div class="chart-card">
            <h2>Pressure (hPa)</h2>
            <canvas id="press-chart"></canvas>
        </div>
        <div class="chart-card full-width">
            <h2>Particulate Matter (µg/m³)</h2>
            <canvas id="pm-chart"></canvas>
        </div>
        <div class="chart-card full-width">
            <h2>Gas Sensors (Ω)</h2>
            <canvas id="gas-chart"></canvas>
        </div>
    </div>

    <p class="last-updated" id="footer-updated">Last sync: --</p>

</div>
<script>
    Chart.defaults.color = '#9ca3af'
    Chart.defaults.borderColor = '#f3f4f6'

    function getOptions(showLegend = false) {
        return {
            responsive: true,
            scales: {
                x: {
                    type: 'time',
                    time: { unit: 'minute' },
                    grid: { color: '#f9fafb' },
                    ticks: { color: '#9ca3af', font: { size: 11 } }
                },
                y: {
                    grid: { color: '#f9fafb' },
                    ticks: { color: '#9ca3af', font: { size: 11 } }
                }
            },
            plugins: {
                legend: {
                    display: showLegend,
                    labels: { color: '#6b7280', font: { size: 11 }, boxWidth: 12 }
                }
            }
        }
    }

    function createChart(canvasId, label, color) {
        return new Chart(document.getElementById(canvasId), {
            type: 'line',
            data: {
                labels: [],
                datasets: [{
                    label: label,
                    data: [],
                    borderColor: color,
                    backgroundColor: color + '18',
                    tension: 0.3,
                    pointRadius: 1.5,
                    borderWidth: 1.5,
                    fill: true
                }]
            },
            options: getOptions(false)
        })
    }

    function createMultiChart(canvasId, datasets) {
        return new Chart(document.getElementById(canvasId), {
            type: 'line',
            data: {
                labels: [],
                datasets: datasets.map(d => ({
                    label: d.label,
                    data: [],
                    borderColor: d.color,
                    backgroundColor: d.color + '12',
                    tension: 0.3,
                    pointRadius: 1.5,
                    borderWidth: 1.5,
                    fill: false
                }))
            },
            options: getOptions(true)
        })
    }

    const tempChart  = createChart('temp-chart',  'Temperature °C', '#ef4444')
    const humChart   = createChart('hum-chart',   'Humidity %',     '#3b82f6')
    const pressChart = createChart('press-chart', 'Pressure hPa',   '#8b5cf6')

    const pmChart = createMultiChart('pm-chart', [
        { label: 'PM1.0', color: '#3b82f6' },
        { label: 'PM2.5', color: '#f59e0b' },
        { label: 'PM10',  color: '#ef4444' }
    ])

    const gasChart = createMultiChart('gas-chart', [
        { label: 'Oxidising', color: '#ef4444' },
        { label: 'Reducing',  color: '#3b82f6' },
        { label: 'NH3',       color: '#10b981' }
    ])

    function updateChart(chart, labels, values) {
        chart.data.labels = labels
        chart.data.datasets[0].data = values
        chart.update()
    }

    function updateAll() {
        fetch('/api/readings')
            .then(r => r.json())
            .then(data => {
                if (data.length === 0) return

                const timestamps = data.map(r => r.timestamp)
                const latest = data[0]

                document.getElementById('latest-temp').textContent      = (latest.temperature?.toFixed(1) ?? '--') + '°C'
                document.getElementById('latest-hum').textContent       = (latest.humidity?.toFixed(1) ?? '--') + '%'
                document.getElementById('latest-press').textContent     = ((latest.pressure ?? 0) / 100).toFixed(1)
                document.getElementById('latest-pm25').textContent      = latest.PM25?.toFixed(1) ?? '--'
                document.getElementById('latest-oxidising').textContent = latest.oxidising?.toFixed(0) ?? '--'
                document.getElementById('latest-reducing').textContent  = latest.reducing?.toFixed(0) ?? '--'
                document.getElementById('latest-nh3').textContent       = latest.nh3?.toFixed(0) ?? '--'

                updateChart(tempChart,  timestamps, data.map(r => r.temperature))
                updateChart(humChart,   timestamps, data.map(r => r.humidity))
                updateChart(pressChart, timestamps, data.map(r => (r.pressure / 100).toFixed(2)))

                pmChart.data.labels = timestamps
                pmChart.data.datasets[0].data = data.map(r => r.PM1)
                pmChart.data.datasets[1].data = data.map(r => r.PM25)
                pmChart.data.datasets[2].data = data.map(r => r.PM10)
                pmChart.update()

                gasChart.data.labels = timestamps
                gasChart.data.datasets[0].data = data.map(r => r.oxidising)
                gasChart.data.datasets[1].data = data.map(r => r.reducing)
                gasChart.data.datasets[2].data = data.map(r => r.nh3)
                gasChart.update()

                const time = new Date().toLocaleTimeString()
                document.getElementById('last-updated').textContent = time
                document.getElementById('footer-updated').textContent = 'Last sync: ' + time
            })
    }

    updateAll()
    setInterval(updateAll, 30000)
</script>
</body>
</html>
